{% extends "documents/base.html" %}

{% block content %}
<div class="card">
    <span class="badge badge-error">Danger Zone</span>
    <h1>Delete Document</h1>

    <p>Are you sure you want to delete this document?</p>
    <h2>{{ document.title }}</h2>

    <p class="muted">
        This action will also delete all related chunks. This cannot be undone.
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="actions">
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a class="btn btn-light" href="{% url 'ui-document-detail' document.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
