<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Document QA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-main: #f4f7fb;
            --bg-card: #ffffff;
            --bg-dark: #0f172a;
            --bg-soft: #e5e7eb;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --danger: #dc2626;
            --danger-dark: #b91c1c;
            --success: #16a34a;
            --warning: #f59e0b;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 16px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
                radial-gradient(circle at bottom right, rgba(22, 163, 74, 0.08), transparent 25%),
                var(--bg-main);
            color: var(--text-main);
        }

        a {
            color: inherit;
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: white;
            padding: 28px 20px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 34px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #2563eb, #22c55e);
            font-weight: 800;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }

        .brand-title {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
        }

        .brand-subtitle {
            color: #cbd5e1;
            font-size: 12px;
            margin-top: 3px;
        }

        .nav-section-title {
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 22px 10px 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            margin-bottom: 6px;
            color: #e5e7eb;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.2s ease;
            font-size: 14px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.09);
            transform: translateX(3px);
        }

        .nav-icon {
            width: 22px;
            text-align: center;
        }

        .main {
            padding: 30px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 26px;
        }

        .page-title h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: -0.03em;
        }

        .page-title p {
            margin: 8px 0 0;
            color: var(--text-muted);
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(229, 231, 235, 0.85);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        .card-compact {
            padding: 18px;
        }

        .card h1,
        .card h2,
        .card h3 {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            right: -34px;
            top: -34px;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.10);
        }

        .stat-number {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
        }

        .stat-label {
            color: var(--text-muted);
            margin: 6px 0 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger-dark);
        }

        .btn-light {
            background: #f8fafc;
            color: #0f172a;
            border: 1px solid var(--border);
        }

        .btn-light:hover {
            background: #eef2ff;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 12px 13px;
            margin-top: 7px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            background: #ffffff;
            outline: none;
            transition: 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        label {
            font-weight: 700;
            font-size: 14px;
        }

        .message {
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 18px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border-color: #bbf7d0;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: #e5e7eb;
            color: #374151;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-blue {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .muted {
            color: var(--text-muted);
        }

        .list-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
            padding: 18px 0;
            border-bottom: 1px solid var(--border);
        }

        .list-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .list-title {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .list-meta {
            color: var(--text-muted);
            font-size: 13px;
            margin: 6px 0;
        }

        pre {
            white-space: pre-wrap;
            background: #0f172a;
            color: #e5e7eb;
            padding: 18px;
            border-radius: 14px;
            overflow-x: auto;
            line-height: 1.6;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 36px 18px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 18px 0;
        }

        .hero {
            padding: 34px;
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(34, 197, 94, 0.10)),
                white;
        }

        .hero h1 {
            font-size: 36px;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
        }

        .hero p {
            font-size: 16px;
            max-width: 760px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                height: auto;
            }

            .main {
                padding: 18px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .grid-two {
                grid-template-columns: 1fr;
            }

            .list-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">QA</div>
                <div>
                    <div class="brand-title">LLM Document QA</div>
                    <div class="brand-subtitle">Document Intelligence System</div>
                </div>
            </div>

            <div class="nav-section-title">Main</div>
            <a class="nav-link" href="{% url 'ui-home' %}">
                <span class="nav-icon">🏠</span> Home
            </a>
            <a class="nav-link" href="{% url 'ui-document-list' %}">
                <span class="nav-icon">📄</span> Documents
            </a>
            <a class="nav-link" href="{% url 'ui-document-upload' %}">
                <span class="nav-icon">⬆️</span> Upload
            </a>

            <div class="nav-section-title">AI Tools</div>
            <a class="nav-link" href="{% url 'ui-search' %}">
                <span class="nav-icon">🔎</span> Search
            </a>
            <a class="nav-link" href="{% url 'ui-ask' %}">
                <span class="nav-icon">💬</span> Ask
            </a>
            <a class="nav-link" href="{% url 'ui-history' %}">
                <span class="nav-icon">🕘</span> History
            </a>

            <div class="nav-section-title">Developer</div>
            <a class="nav-link" href="/api/docs/">
                <span class="nav-icon">📘</span> API Docs
            </a>
            <a class="nav-link" href="/api/redoc/">
                <span class="nav-icon">📚</span> ReDoc
            </a>
            <a class="nav-link" href="/admin/">
                <span class="nav-icon">⚙️</span> Admin
            </a>
        </aside>

        <main class="main">
            <div class="container">
                {% if messages %}
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
